spring:
  application:
    name: TradingGate Backend

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        globally_quoted_identifiers: true

  # ==========================
  # Kafka
  # ==========================
  kafka:
    bootstrap-servers: ${KAFKA_BROKER_HOST:localhost}:${KAFKA_BROKER_PORT:9092}

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest
      enable-auto-commit: false

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

    listener:
      ack-mode: MANUAL
      missing-topics-fatal: false

# ==========================
# Redis
# ==========================
redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  # password: ${REDIS_PASSWORD:}

# ==========================
# Actuator
# ==========================
#management:
#  endpoints:
#    web:
#      exposure:
#        include: health,info
#  endpoint:
#    health:
#      show-details: when_authorized

# ==========================
# logging
# ==========================
logging:
  level:
    root: INFO
    org.springframework.kafka: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE


# ==========================
# outbox
# ==========================
outbox:
  batch-size: 200
  max-retries: 10
  poll-interval-ms: 200
  monitor-interval-ms: 5000


# ============================================
#  Profile: local
# ============================================
---
spring:
  config:
    activate:
      on-profile: local

server:
  port: ${APP_PORT:8080}

tradinggate:
  env: local


# ============================================
#  Profile: api
# ============================================
---
spring:
  config:
    activate:
      on-profile: api
  datasource:
    url: jdbc:postgresql://${TRADING_DB_HOST:localhost}:${TRADING_DB_PORT:5432}/${TRADING_DB_NAME:trading_db}
    username: ${TRADING_DB_USER:trading_user}
    password: ${TRADING_DB_PASSWORD:trading_pass}
    driver-class-name: org.postgresql.Driver
  kafka:
    consumer:
      group-id: trading-api

server:
  port: ${API_PORT:8080}

tradinggate:
  role: api
  topics:
    orders-in: orders.in
    orders-updated: orders.updated
    trades-executed: trades.executed


# ============================================
#  Profile: worker
# ============================================
---
spring:
  config:
    activate:
      on-profile: worker
  datasource:
    url: jdbc:postgresql://${TRADING_DB_HOST:localhost}:${TRADING_DB_PORT:5432}/${TRADING_DB_NAME:trading_db}
    username: ${TRADING_DB_USER:trading_user}
    password: ${TRADING_DB_PASSWORD:trading_pass}
    driver-class-name: org.postgresql.Driver
  kafka:
    consumer:
      group-id: matching-worker

server:
  port: 0

tradinggate:
  role: worker
  matching:
    orders-in-topic: orders.in
    trades-executed-topic: trades.executed
    orders-updated-topic: orders.updated
    risk-commands-topic: risk.commands
    partitioning-key: symbol
    orders-in-partitions: 12
    base-dir: ${TRADINGGATE_SNAPSHOT_BASE_DIR:/data/tradinggate}
    fallback-count: 5
  kafka:
    admin:
      request-timeout-ms: 3000
      cache-ttl-ms: 30000
      fallback-partitions: 12


