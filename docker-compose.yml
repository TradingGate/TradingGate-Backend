version: "3.9"

services:
  # ==========================
  # PostgreSQL - Trading DB
  # ==========================
  trading-postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TRADING_DB_USER}
      POSTGRES_PASSWORD: ${TRADING_DB_PASSWORD}
      POSTGRES_DB: ${TRADING_DB_NAME}
    ports:
      - "${TRADING_DB_PORT}:5432"
    volumes:
      - trading_pgdata:/var/lib/postgresql/data
    networks:
      - trading-net

  # ==========================
  # PostgreSQL - Ledger DB
  # ==========================
  ledger-postgres:
    image: postgres:15-alpine
    container_name: ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LEDGER_DB_USER}
      POSTGRES_PASSWORD: ${LEDGER_DB_PASSWORD}
      POSTGRES_DB: ${LEDGER_DB_NAME}
    ports:
      - "${LEDGER_DB_PORT}:5432"
    volumes:
      - ledger_pgdata:/var/lib/postgresql/data
    networks:
      - trading-net

  # ==========================
  # Zookeeper
  # ==========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    networks:
      - trading-net

  # ==========================
  # Kafka Broker
  # ==========================
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_BROKER_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1

      # Zookeeper 연결
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # 내부/외부 리스너 설정
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 자동 토픽 생성 허용
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # 연결 스레드/버퍼 최적화
      KAFKA_NUM_PARTITIONS: 12

    networks:
      - trading-net

  # ==========================
  # Redis
  # ==========================
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading-net

networks:
  trading-net:

volumes:
  trading_pgdata:
  ledger_pgdata:
  redis_data: