apiVersion: v1
kind: ConfigMap
metadata:
  name: tradinggate-app-config
  namespace: tradinggate-demo
data:
  TZ: Asia/Seoul
  SPRING_PROFILES_ACTIVE: api
  SERVER_PORT: "8080"
  SPRING_JPA_HIBERNATE_DDL_AUTO: none
  KAFKA_BROKER_HOST: kafka
  KAFKA_BROKER_PORT: "9092"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  SPRING_DATA_REDIS_HOST: redis
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_REDIS_HOST: redis
  SPRING_REDIS_PORT: "6379"
  TRADING_DB_HOST: trading-postgres
  TRADING_DB_PORT: "5432"
  TRADING_DB_NAME: trading_db
  LEDGER_DB_HOST: ledger-postgres
  LEDGER_DB_PORT: "5432"
  LEDGER_DB_NAME: ledger_db
  APP_PORT: "8080"
  API_PORT: "8080"
