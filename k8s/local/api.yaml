apiVersion: apps/v1
kind: Deployment
metadata:
  name: tradinggate-api
  namespace: tradinggate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tradinggate-api
  template:
    metadata:
      labels:
        app: tradinggate-api
    spec:
      containers:
        - name: api
          image: tradinggate-backend:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: tradinggate-app-config
            - secretRef:
                name: tradinggate-app-secrets
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: api
            - name: SERVER_PORT
              value: "8080"
          ports:
            - containerPort: 8080
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
---
apiVersion: v1
kind: Service
metadata:
  name: tradinggate-api
  namespace: tradinggate
spec:
  type: NodePort
  selector:
    app: tradinggate-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
